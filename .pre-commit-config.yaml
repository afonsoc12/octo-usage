repos:
  # Pre-commit default checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: debug-statements
      - id: mixed-line-ending

  # Ruff: format check
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

  # Ruff: lint & import check
  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff Lint
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true

  # Pytest: unit tests only
  - repo: local
    hooks:
      - id: pytest
        name: Pytest
        entry: uv run pytest -m "not integration"
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: false
        always_run: true
